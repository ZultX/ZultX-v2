<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ZultX</title>
  <meta name="theme-color" content="#0f172a" />
  <style>
    :root {
      --bg: #0b1020;
      --panel: #10172d;
      --border: rgba(255,255,255,.08);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #7c3aed;
      --user: #1f2937;
      --assistant: #111827;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      background: radial-gradient(1200px 600px at top, rgba(124,58,237,.16), transparent 50%), var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 15, 30, .72);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .wrap {
      width: min(900px, 100% - 24px);
      margin: 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: .2px;
    }

    .brand-badge {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), #06b6d4);
      box-shadow: 0 0 0 6px rgba(124,58,237,.12);
    }

    .chat {
      padding: 12px 0 100px;
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 8px;   /* tighter */
    }
    

    .msg {
      max-width: 70%;                 /* was 760px/92% */
      padding: 8px 12px;              /* was 14px 16px */
      border: 1px solid var(--border);
      border-radius: 14px;            /* was 18px */
      box-shadow: 0 6px 18px rgba(0,0,0,.25); /* softer shadow */
      white-space: pre-wrap;
      line-height: 1.4;               /* tighter text */
      font-size: 14px;                /* slightly smaller text */
      overflow-wrap: anywhere;
      position: relative;
    }
  

    .msg {
      width: fit-content;
    }
    
    .msg.user {
      align-self: flex-end;
      background: linear-gradient(180deg, rgba(124,58,237,.14), rgba(124,58,237,.08)), var(--user);
      border-top-right-radius: 6px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: linear-gradient(180deg, rgba(34,197,94,.08), rgba(255,255,255,.02)), var(--assistant);
      border-top-left-radius: 6px;
    }

    .msg-content {
      display: inline;
    }

    
    
    .cursor {
      display: inline-block;
      margin-left: 1px;
      opacity: 1;
      animation: blink 1s steps(1, end) infinite;
      color: rgba(229,231,235,.9);
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .composer {
      position: sticky;
      bottom: 0;
      padding: 16px 0 20px;
      background: linear-gradient(to top, rgba(11,16,32,1) 75%, rgba(11,16,32,.4));
      border-top: 1px solid rgba(255,255,255,.04);
    }

    .composer-inner {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: rgba(16,23,45,.9);
      box-shadow: var(--shadow);
    }

    textarea {
      width: 100%;
      min-height: 52px;
      max-height: 160px;
      resize: none;
      border: 0;
      outline: 0;
      color: var(--text);
      background: transparent;
      font: inherit;
      line-height: 1.5;
      padding: 14px 12px;
    }

    textarea::placeholder { color: #64748b; }

    button {
      border: 0;
      outline: 0;
      cursor: pointer;
      color: white;
      font: inherit;
      border-radius: 16px;
      padding: 14px 18px;
      transition: transform .12s ease, opacity .12s ease;
    }

    button:active { transform: scale(.98); }

    .send {
      background: linear-gradient(135deg, var(--accent), #2563eb);
      min-width: 92px;
      font-weight: 700;
    }

    .send[disabled] {
      opacity: .6;
      cursor: not-allowed;
    }

    .stop {
      background: rgba(239, 68, 68, .18);
      border: 1px solid rgba(239, 68, 68, .28);
      min-width: 92px;
      font-weight: 700;
    }

    .status {
      padding: 8px 2px 0;
      color: var(--muted);
      font-size: 13px;
      min-height: 20px;
    }

    .hint {
      padding: 10px 2px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .empty {
      margin: 42px 0 0;
      padding: 22px;
      border: 1px dashed rgba(255,255,255,.12);
      border-radius: 22px;
      color: var(--muted);
      text-align: center;
      background: rgba(255,255,255,.02);
    }

    @media (max-width: 640px) {
      .wrap { width: min(100% - 14px, 100%); }
      .msg { max-width: 96%; }
      .composer-inner { padding: 10px; border-radius: 18px; }
      button { padding: 12px 14px; }
      textarea { min-height: 46px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      
      <div class="wrap">
        <div class="brand">
          <span class="brand-badge"></span>
          <span>ZultX</span>
        </div>
      </div>
      <select id="modeSwitch">
        <option value="backend">Backend (ZultX)</option>
        <option value="puter">Puter AI</option>
      </select>
    </header>

    <main class="wrap chat">
      <div id="messages" class="messages"></div>
      <div id="empty" class="empty">Ask something and the reply will stream here.</div>
    </main>

    <section class="composer">
      <div class="wrap">
        <div class="composer-inner">
          <input type="file" id="imageInput" accept="image/*" hidden />
          <button id="imgBtn">📎</button>
          <textarea id="input" placeholder="Ask ZultX..."></textarea>
          <button id="sendBtn" class="send">Send</button>
          <button id="stopBtn" class="stop" style="display:none;">Stop</button>
        </div>
        <div id="status" class="status"></div>
        <div class="hint">Fast SSE first. If SSE is unavailable, it falls back to full text.</div>
      </div>
    </section>
  </div>

  <script src="https://js.puter.com/v2/"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const API_BASE = 'https://zultx.onrender.com/ask';

    const messagesEl = document.getElementById('messages');
    const emptyEl = document.getElementById('empty');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusEl = document.getElementById('status');

    let abortController = null;
    let isStreaming = false;
    let currentAssistantMsg = null;
    let currentAssistantText = '';
    let currentAssistantContentNode = null;
    let currentCursorNode = null;

    let pendingText = '';
    let flushScheduled = false;

    const imageInput = document.getElementById("imageInput");
    const imgBtn = document.getElementById("imgBtn");

    let selectedImage = null;

    imgBtn.addEventListener("click", () => {
      imageInput.click();
    });

    imageInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      selectedImage = file;

      setStatus("Image selected ✅");
   });
    
    function setStatus(text) {
      statusEl.textContent = text || '';
    }

    function showEmpty() {
      emptyEl.style.display = messagesEl.children.length ? 'none' : 'block';
    }

    function escapeHtml(str) {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    function scrollToBottom() {
      window.scrollTo({ top: document.body.scrollHeight });
    }

    function setButtons(streaming) {
      isStreaming = streaming;
      sendBtn.style.display = streaming ? 'none' : 'inline-block';
      stopBtn.style.display = streaming ? 'inline-block' : 'none';
      inputEl.disabled = streaming;
    }

    let markdownTimer = null;
    function scheduleMarkdownRender() {
      if (markdownTimer) return;

      markdownTimer = setTimeout(() => {
        markdownTimer = null;

        if (!currentAssistantContentNode) return;

        const html = marked.parse(currentAssistantText);
        currentAssistantContentNode.innerHTML = html;

        scrollToBottom();
      }, 300); // 🔥 tweak: 200–500ms sweet spot
    }
    
    function addMessage(role, text = '') {
      const el = document.createElement('div');
      el.className = `msg ${role}`;

      if (role === 'assistant') {
        const content = document.createElement('span');
        content.className = 'msg-content';
        content.textContent = text;

        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        cursor.textContent = '▋';

        el.appendChild(content);
        el.appendChild(cursor);

        currentAssistantContentNode = content;
        currentCursorNode = cursor;
      } else {
        el.innerHTML = escapeHtml(text);
      }

      messagesEl.appendChild(el);
      showEmpty();
      return el;
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    
    async function streamPuter(prompt) {
      setStatus("Streaming (puter)...");

      try {

        let messageContent;

        if (selectedImage) {
           // Convert image to base64
          const base64 = await fileToBase64(selectedImage);

          messageContent = [
            { type: "text", text: prompt },
            {
              type: "image_url",
              image_url: {
                url: base64
              }
            }
          ];
        } else {
          messageContent = prompt;
     }

        const response = await puter.ai.chat(
          messageContent,
          {
            model: "openai/gpt-4o", // ✅ use vision model
            stream: true
          }
      );
 
        for await (const part of response) {
          const text =
           part?.text ||
           part?.delta ||
           part?.message?.content ||
           part?.choices?.[0]?.delta?.content ||
           "";
          const text = part?.text || "";
          if (!text) continue;

          appendAssistantChunk(text);
          
       }

        finalizeAssistantMessage();
        setStatus("Done");

        selectedImage = null; // reset after sending

      } catch (err) {
        if (err?.name === "AbortError") {
          setStatus("Stopped");
          return;
        }
        throw err;
      }
    }
    
    
    function getPrompt() {
      return inputEl.value.trim();
    }

    function buildUrl(prompt) {
      const url = new URL(API_BASE);
      url.searchParams.set('q', prompt);
      url.searchParams.set('stream', '1');
      return url.toString();
    }

    function scheduleFlush() {
      if (flushScheduled) return;
      flushScheduled = true;

      requestAnimationFrame(() => {
        flushScheduled = false;
        if (!pendingText) return;

        currentAssistantText += pendingText;
        pendingText = '';

        if (currentAssistantContentNode) {
          currentAssistantContentNode.textContent = currentAssistantText;
        }

        scrollToBottom();
      });
    }

    function appendAssistantChunk(chunk) {
      if (!chunk) return;

      pendingText += chunk;
      scheduleFlush();
    }


    function finalizeAssistantMessage() {
      if (currentAssistantContentNode) {
         currentAssistantContentNode.innerHTML = marked.parse(currentAssistantText);
      }

      if (currentCursorNode) {
        currentCursorNode.remove();
       currentCursorNode = null;
     }
      scrollToBottom();
    }
    
    
      

    function resetAssistantState() {
      currentAssistantMsg = null;
      currentAssistantText = '';
      currentAssistantContentNode = null;
      currentCursorNode = null;
      pendingText = '';
      flushScheduled = false;
    }

    async function fallbackFullText(prompt) {
      setStatus('Loading full text fallback…');

      const url = new URL(API_BASE);
      url.searchParams.set('q', prompt);
      url.searchParams.set('stream', '0');

      const res = await fetch(url.toString(), {
        method: 'GET',
        headers: { 'Accept': 'application/json,text/plain,*/*' },
        signal: abortController.signal,
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const contentType = (res.headers.get('content-type') || '').toLowerCase();
      let text = '';

      if (contentType.includes('application/json')) {
        const data = await res.json();
        text = data.answer ?? data.text ?? data.response ?? JSON.stringify(data);
      } else {
        text = await res.text();
      }

      currentAssistantText = text || '(empty response)';
      if (currentAssistantContentNode) {
        currentAssistantContentNode.textContent = currentAssistantText;
      }
      if (currentCursorNode) {
        currentCursorNode.remove();
        currentCursorNode = null;
      }

      setStatus('Done');
      scrollToBottom();
    }

    async function streamSSE(prompt) {
      const url = buildUrl(prompt);

      const res = await fetch(url, {
        method: 'GET',
        headers: {
          'Accept': 'text/event-stream',
          'Cache-Control': 'no-cache',
        },
        signal: abortController.signal,
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder('utf-8');
      let buffer = '';
      let sawAnyData = false;

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        if (chunk) sawAnyData = true;
        buffer += chunk;

        let idx;
        while ((idx = buffer.indexOf('\n\n')) !== -1) {
          const packet = buffer.slice(0, idx);
          buffer = buffer.slice(idx + 2);

          const lines = packet.split(/\r?\n/);
          let eventData = '';

          for (const line of lines) {
            if (line.startsWith('data:')) eventData += line.slice(5);
          }

          eventData = eventData.trim();
          if (!eventData) continue;

          if (eventData === '[DONE]') {
            finalizeAssistantMessage();
            setStatus('Done');
            return;
          }

          let token = '';
          try {
            const parsed = JSON.parse(eventData);
            token = parsed.token ?? parsed.delta ?? parsed.text ?? parsed.content ?? '';
          } catch {
            token = eventData;
          }

          if (!token || token === '\u200b') continue;

          if (token === '[DONE]') {
            finalizeAssistantMessage();
            setStatus('Done');
            return;
          }

          appendAssistantChunk(token);          
          setStatus('Streaming…');
        }
      }

      if (!sawAnyData && !currentAssistantText) {
        throw new Error('No SSE data received');
      }

      finalizeAssistantMessage();
      setStatus('');
    }

    async function ask() {
        const prompt = getPrompt();
        if (!prompt || isStreaming) return;

        addMessage('user', prompt);
        inputEl.value = '';
        inputEl.style.height = 'auto';

        resetAssistantState();
        currentAssistantMsg = addMessage('assistant', '');
        setButtons(true);
        setStatus('Connecting...');
        scrollToBottom();

        abortController = new AbortController();

        try {
            const mode = document.getElementById('modeSwitch')?.value || 'backend';

            if (mode === 'puter') {
                await streamPuter(prompt);
            } else {
                await streamSSE(prompt);
            }

        } catch (err) {
            if (err && err.name === 'AbortError') {
                setStatus('Stopped');
                return;
            }

            const mode = document.getElementById('modeSwitch')?.value || 'backend';

            if (mode === 'backend') {
                try {
                    await fallbackFullText(prompt);
                } catch (fallbackErr) {
                    showError(fallbackErr);
                }
            } else {
                showError(err);
            }

        } finally {
            setButtons(false);
            abortController = null;
            showEmpty();
        }
    }

    
    
    function stopAsk() {
      if (abortController) abortController.abort();

      // Puter cancel (soft cancel)
      if (typeof puter !== 'undefined' && puter.ai?.cancel) {
        try { puter.ai.cancel(); } catch {}
      }

      setButtons(false);
      setStatus('Stopped');

      if (currentCursorNode) {
        currentCursorNode.remove();
        currentCursorNode = null;
      }
    }    
    

    sendBtn.addEventListener('click', ask);
    stopBtn.addEventListener('click', stopAsk);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        ask();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    });

    showEmpty();
  </script>
</body>
          </html>
