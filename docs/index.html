<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ZultX</title>
  <meta name="theme-color" content="#0f172a" />
  <style>
    :root {
      --bg: #0b1020;
      --panel: #10172d;
      --panel-2: #0f172a;
      --border: rgba(255,255,255,.08);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #7c3aed;
      --accent-2: #22c55e;
      --user: #1f2937;
      --assistant: #111827;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: radial-gradient(1200px 600px at top, rgba(124,58,237,.16), transparent 50%), var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 15, 30, .72);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: .2px;
    }
    .brand-badge {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), #06b6d4);
      box-shadow: 0 0 0 6px rgba(124,58,237,.12);
    }
    .wrap {
      width: min(900px, 100% - 24px);
      margin: 0 auto;
    }
    .chat {
      padding: 18px 0 140px;
    }
    .messages {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .msg {
      max-width: min(760px, 92%);
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      white-space: pre-wrap;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }
    .msg.user {
      align-self: flex-end;
      background: linear-gradient(180deg, rgba(124,58,237,.14), rgba(124,58,237,.08)), var(--user);
      border-top-right-radius: 6px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: linear-gradient(180deg, rgba(34,197,94,.08), rgba(255,255,255,.02)), var(--assistant);
      border-top-left-radius: 6px;
    }
    .meta {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }
    .composer {
      position: sticky;
      bottom: 0;
      padding: 16px 0 20px;
      background: linear-gradient(to top, rgba(11,16,32,1) 75%, rgba(11,16,32,.4));
      border-top: 1px solid rgba(255,255,255,.04);
    }
    .composer-inner {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: rgba(16,23,45,.9);
      box-shadow: var(--shadow);
    }
    textarea {
      width: 100%;
      min-height: 52px;
      max-height: 160px;
      resize: none;
      border: 0;
      outline: 0;
      color: var(--text);
      background: transparent;
      font: inherit;
      line-height: 1.5;
      padding: 14px 12px;
    }
    textarea::placeholder { color: #64748b; }
    button {
      border: 0;
      outline: 0;
      cursor: pointer;
      color: white;
      font: inherit;
      border-radius: 16px;
      padding: 14px 18px;
      transition: transform .12s ease, opacity .12s ease, background .12s ease;
    }
    button:active { transform: scale(.98); }
    .send {
      background: linear-gradient(135deg, var(--accent), #2563eb);
      min-width: 92px;
      font-weight: 700;
    }
    .send[disabled] { opacity: .6; cursor: not-allowed; }
    .stop {
      background: rgba(239, 68, 68, .18);
      border: 1px solid rgba(239, 68, 68, .28);
      min-width: 92px;
      font-weight: 700;
    }
    .status {
      padding: 8px 2px 0;
      color: var(--muted);
      font-size: 13px;
      min-height: 20px;
    }
    .hint {
      padding: 10px 2px 0;
      color: var(--muted);
      font-size: 12px;
    }
    code, pre {
      white-space: pre-wrap;
      overflow-x: auto;
    }
    .empty {
      margin: 42px 0 0;
      padding: 22px;
      border: 1px dashed rgba(255,255,255,.12);
      border-radius: 22px;
      color: var(--muted);
      text-align: center;
      background: rgba(255,255,255,.02);
    }
    @media (max-width: 640px) {
      .wrap { width: min(100% - 14px, 100%); }
      .msg { max-width: 96%; }
      .composer-inner { padding: 10px; border-radius: 18px; }
      button { padding: 12px 14px; }
      textarea { min-height: 46px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="wrap">
        <div class="brand"><span class="brand-badge"></span><span>ZultX</span></div>
      </div>
    </header>

    <main class="wrap chat">
      <div id="messages" class="messages"></div>
      <div id="empty" class="empty">Ask something and the reply will stream here.</div>
    </main>

    <section class="composer">
      <div class="wrap">
        <div class="composer-inner">
          <textarea id="input" placeholder="Ask ZultX..."></textarea>
          <button id="sendBtn" class="send">Send</button>
          <button id="stopBtn" class="stop" style="display:none;">Stop</button>
        </div>
        <div id="status" class="status"></div>
        <div class="hint">Streaming first. If SSE is unavailable, it falls back to full text.</div>
      </div>
    </section>
  </div>

  <script>
    const API_BASE = 'https://zultx.onrender.com/ask';
    const messagesEl = document.getElementById('messages');
    const emptyEl = document.getElementById('empty');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusEl = document.getElementById('status');

    let abortController = null;
    let currentAssistantMsg = null;
    let currentAssistantText = '';
    let isStreaming = false;

    function setStatus(text) {
      statusEl.textContent = text || '';
    }

    function showEmpty() {
      emptyEl.style.display = messagesEl.children.length ? 'none' : 'block';
    }

    function escapeHtml(str) {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    function addMessage(role, text = '') {
      const el = document.createElement('div');
      el.className = `msg ${role}`;
      el.innerHTML = escapeHtml(text);
      messagesEl.appendChild(el);
      showEmpty();
      return el;
    }

    function scrollToBottom() {
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function setButtons(streaming) {
      isStreaming = streaming;
      sendBtn.style.display = streaming ? 'none' : 'inline-block';
      stopBtn.style.display = streaming ? 'inline-block' : 'none';
      inputEl.disabled = streaming;
    }

    function getPrompt() {
      return inputEl.value.trim();
    }

    function buildUrl(prompt) {
      const url = new URL(API_BASE);
      url.searchParams.set('q', prompt);
      url.searchParams.set('stream', '1');
      return url.toString();
    }
    function appendAssistantChunk(chunk) {
      if (!chunk) return;

      currentAssistantText += chunk;

      if (currentAssistantMsg) {
        currentAssistantMsg.textContent += chunk; // append only
        scrollToBottom();
      }
   }
  
    

    async function fallbackFullText(prompt) {
      setStatus('Loading full text fallback…');
      const url = new URL(API_BASE);
      url.searchParams.set('q', prompt);
      url.searchParams.set('stream', '0');

      const res = await fetch(url.toString(), {
        method: 'GET',
        headers: { 'Accept': 'application/json,text/plain,*/*' },
        signal: abortController.signal,
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const contentType = (res.headers.get('content-type') || '').toLowerCase();
      let text = '';

      if (contentType.includes('application/json')) {
        const data = await res.json();
        text = data.answer ?? data.text ?? data.response ?? JSON.stringify(data);
      } else {
        text = await res.text();
      }

      currentAssistantText = text || '(empty response)';
      currentAssistantMsg.textContent = currentAssistantText;

      
      setStatus('Done');
      scrollToBottom();
    }

    async function streamSSE(prompt) {
      const url = buildUrl(prompt);
      const res = await fetch(url, {
        method: 'GET',
        headers: {
          'Accept': 'text/event-stream',
          'Cache-Control': 'no-cache',
        },
        signal: abortController.signal,
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder('utf-8');
      let buffer = '';
      let sawStreamData = false;

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        if (chunk) sawStreamData = true;
        buffer += chunk;

        let idx;
        while ((idx = buffer.indexOf('\n\n')) !== -1) {
          const packet = buffer.slice(0, idx);
          buffer = buffer.slice(idx + 2);

          const lines = packet.split(/\r?\n/);
          let eventData = '';
          for (const line of lines) {
            if (line.startsWith('data:')) eventData += line.slice(5);
            if (line.startsWith('event:')) continue;
          }

          if (!eventData) continue;
          const parsed = JSON.parse(eventData);
          const token = parsed.token ?? parsed.delta ?? parsed.text ?? parsed.content;
          if (token === '[DONE]') {
            setStatus('Done');
            return;
          }
          

          try {          
            if (typeof token === 'string' && token) {
              appendAssistantChunk(token);
              setStatus('Streaming…');
            }
          } catch {
            appendAssistantChunk(eventData);
            console.warn('Bad SSE packet:', eventData);
            setStatus('Streaming…');
          }
        }
      }

      if (!sawStreamData && !currentAssistantText) {
        throw new Error('No SSE data received');
      }

      setStatus('');  
      
    }


    async function ask() {
      const prompt = getPrompt();
      if (!prompt || isStreaming) return;

      addMessage('user', prompt);
      inputEl.value = '';

      currentAssistantText = '';
      currentAssistantMsg = addMessage('assistant', '');

      setButtons(true);
      setStatus('Connecting...');
      scrollToBottom();

      abortController = new AbortController();

      try {
        await streamSSE(prompt);   // 🔥 THIS IS THE FIX
      } catch (err) {
        if (err && err.name === 'AbortError') {
          setStatus('Stopped');
          return;
        }

        // fallback
        try {
          await fallbackFullText(prompt);
        } catch (fallbackErr) {
          currentAssistantMsg.innerHTML =
            `Error: ${fallbackErr?.message || fallbackErr}`;
          setStatus('Failed');
        }
      } finally {
        setButtons(false);
        abortController = null;
        showEmpty();
      }
  }
    
    

    

    function stopAsk() {
      if (abortController) abortController.abort();
      setButtons(false);
      setStatus('Stopped');
    }

    sendBtn.addEventListener('click', ask);
    stopBtn.addEventListener('click', stopAsk);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        ask();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    });

    showEmpty();
  </script>
</body>
</html>
